# Static site serving (Astro multi-page output). Serve real files; fall back to
# the matching .html, otherwise 404 (no SPA index.html catch-all).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
