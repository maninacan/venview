# Production — marketing static site (Astro, served by nginx).
app = 'venview-marketing'
primary_region = 'dfw'

[build]
  dockerfile = 'marketing.Dockerfile'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
