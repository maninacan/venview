# Production — GraphQL/REST API (venview-api). Secrets injected at runtime via
# Doppler (`doppler run` in api.Dockerfile); set DOPPLER_TOKEN as a Fly secret.
app = 'venview-api'
primary_region = 'dfw'

[build]
  dockerfile = 'api.Dockerfile'

[env]
  PORT = '8080'
  DOPPLER_PROJECT = 'venos'
  DOPPLER_CONFIG = 'prd'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
