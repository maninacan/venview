# fly.toml app configuration file generated for venview on 2026-06-23T09:06:45-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'venview'
primary_region = 'sjc'

[env]
  DOPPLER_CONFIG = 'production'
  DOPPLER_PROJECT = 'venview'

[[mounts]]
  source = 'lemondrip_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
